<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRABOARD - BRONLY FARM</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff; /* Background Putih */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Iframe */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* Teks Utama di Tengah */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #008080; /* Hijau Tosca */
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 3;
            width: 100%;
        }

        /* Footer Teks di Bawah */
        #footer-dev {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 4;
            color: #888888; /* Warna abu-abu soft */
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        
        #footer-dev span {
            font-weight: bold;
            color: #444444; /* Nama Greenland dibuat sedikit lebih tegas */
        }
    </style>
</head>
<body>
    
    <div id="loader">Memuat Aplikasi Mohon Tunggu...</div>

    <div id="footer-dev">
        Development by <span>Greenland Bhumiaji Agrofarm</span>
    </div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbw48YhhNvBfrKMS0P0d7-58JrIlZxJ4ZMTogKOv4fEVg0_lSbPW968lRQWHTFujGas/exec" 
        onload="
            document.getElementById('loader').style.display='none';
            document.getElementById('footer-dev').style.display='none';
        ">
    </iframe>

</body>
</html>
